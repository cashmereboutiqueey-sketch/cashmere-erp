databases:
  - name: cashmere-postgres
    databaseName: cashmere_erp
    user: cashmere

services:
  - type: web
    name: cashmere-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cashmere-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        # User will update this later in the Render dashboard
        value: "https://your-vercel-domain.vercel.app"
