version: '3.8'

# ── Production Docker Compose ─────────────────────────────────────────────────
# Usage:
#   cp .env.example .env.production   # fill in all values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Before first run:
#   1. Place SSL certs in ./nginx/certs/fullchain.pem and privkey.pem
#      (use Certbot/Let's Encrypt or copy from your CA)
#   2. Set all required env vars in .env.production
#   3. After startup: docker compose exec backend python manage.py createsuperuser

services:
  db:
    image: postgres:15-alpine
    container_name: cashmere-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashmere_erp}
      POSTGRES_USER: ${POSTGRES_USER:-cashmere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashmere}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cashmere-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cashmere}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cashmere_erp}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOW_ALL_ORIGINS=False
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - SECURE_SSL_REDIRECT=False   # Nginx handles SSL termination
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY:-}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET:-}
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
      "
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: cashmerebotique.tech' http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: cashmere-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 15s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: cashmere-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - internal

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  internal:
    driver: bridge
