name: Deploy to Hostinger KVM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /opt/cashmere
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild containers
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production build frontend backend

      - name: Restart services
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

      - name: Run migrations
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py migrate --noinput
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py collectstatic --noinput

      - name: Health check
        run: curl -f http://localhost/api/ && echo "OK"
