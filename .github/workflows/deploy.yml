name: Deploy to Hostinger KVM2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /opt/cashmere
          git remote set-url origin https://cashmereboutiqueey-sketch:${{ secrets.GH_PAT }}@github.com/cashmereboutiqueey-sketch/cashmere-erp.git
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild containers
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production build frontend backend

      - name: Restart services
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend container to be healthy..."
          for i in $(seq 1 40); do
            STATE=$(docker inspect --format='{{.State.Status}}' cashmere-backend 2>/dev/null || echo "missing")
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' cashmere-backend 2>/dev/null || echo "none")
            echo "  attempt $i: state=$STATE health=$HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            if [ "$STATE" = "restarting" ] || [ "$STATE" = "exited" ]; then
              echo "Container is in bad state: $STATE — showing logs:"
              docker logs cashmere-backend --tail 30 || true
            fi
            sleep 5
          done
          echo "ERROR: backend never became healthy after 200s — showing final logs:"
          docker logs cashmere-backend --tail 50 || true
          exit 1

      - name: Run migrations and collect static
        run: |
          cd /opt/cashmere
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py migrate --noinput
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T --user root backend python manage.py collectstatic --noinput
          docker compose -f docker-compose.prod.yml --env-file .env.production exec -T --user root backend chown -R appuser:appgroup /app/staticfiles

      - name: Health check
        run: curl -fL https://cashmerebotique.tech/api/ && echo "OK"
